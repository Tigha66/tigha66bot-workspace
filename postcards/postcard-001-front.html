<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Postcard Front - RCJ Cleaning</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 6in; height: 4in; font-family: system-ui, sans-serif; position: relative; }
        .front { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100%; padding: 40px; color: white; display: flex; flex-direction: column; justify-content: center; }
        .headline { font-size: 32px; font-weight: bold; margin-bottom: 15px; line-height: 1.2; }
        .subhead { font-size: 18px; opacity: 0.95; margin-bottom: 30px; }
        .website-preview { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .preview-text { color: #667eea; font-size: 14px; font-weight: bold; }
        .qr-section { display: flex; align-items: center; gap: 15px; margin-top: 20px; }
        .qr-placeholder { width: 100px; height: 100px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #667eea; font-size: 12px; text-align: center; }
        .qr-text { font-size: 14px; }
        .business-name { position: absolute; bottom: 30px; left: 40px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="front">
        <div class="headline">We Built Your Business a Website! 🎉</div>
        <div class="subhead">See what RCJ Cleaning Specialists could look like online</div>
        <div class="website-preview">
            <div class="preview-text">🌐 Preview: minty-moment-bq3v.here.now</div>
        </div>
        <div class="qr-section">
            <div class="qr-placeholder">[QR CODE]<br>Scan to View</div>
            <div class="qr-text">Scan to see<br>your website</div>
        </div>
        <div class="business-name">RCJ Cleaning Specialists</div>
    </div>
</body>
</html>
